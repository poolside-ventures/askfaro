name: Release

# Builds per-platform wheels and publishes askfaro to PyPI when a `v*` tag is
# pushed. askfaro is a maturin (Rust + Python) project, so it needs a wheel matrix
# (manylinux + macOS), not a single pure-Python wheel.
#
# To release: bump the version in Cargo.toml ([package] version), commit, then
#   git tag v0.2.0 && git push origin v0.2.0

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  contract:
    name: Live contract checks (gate the release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Build + install
        run: |
          uv venv
          uv pip install ".[dev]"
      - name: Live contract tests
        # Block the publish if the SDK has drifted from the REAL Faro contract.
        # The authed run() check needs FARO_API_KEY (an unknown-skill probe, $0);
        # without the secret it skips and the no-key discovery + core checks still
        # gate. Add the FARO_API_KEY repo secret to make the run() path binding.
        env:
          FARO_API_KEY: ${{ secrets.FARO_API_KEY }}
        run: .venv/bin/pytest -m live -v --tb=short

  build-wheels:
    name: Build wheels (${{ matrix.platform.target }})
    needs: contract
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: ubuntu-latest, target: x86_64, manylinux: auto }
          - { runner: ubuntu-latest, target: aarch64, manylinux: auto }
          - { runner: macos-latest, target: universal2-apple-darwin, manylinux: "off" }
    steps:
      - uses: actions/checkout@v5
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          manylinux: ${{ matrix.platform.manylinux }}
          args: --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.target }}
          path: dist/*.whl

  publish-pypi:
    name: Publish to PyPI
    needs: build-wheels
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # PyPI trusted publishing (OIDC) — no API token. Register the trusted
      # publisher (repo poolside-ventures/askfaro, workflow release.yml,
      # environment pypi) at:
      # https://pypi.org/manage/project/askfaro/settings/publishing/
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        # Wheels only: askfaro bundles the in-repo faro-core-free crate, so there
        # is no standalone-buildable sdist.
