name: Release

# Builds per-platform wheels and publishes askfaro to PyPI when a `v*` tag is
# pushed. askfaro is a maturin (Rust + Python) project, so it needs a wheel matrix
# (manylinux + macOS), not a single pure-Python wheel.
#
# To release: bump the version in Cargo.toml ([workspace.package] version) AND
# python/askfaro/__init__.py (__version__), commit, then
#   git tag v0.2.0 && git push origin v0.2.0
# The wheel version is Cargo.toml's — the version-guard below fails the release
# if the three (Cargo.toml, __init__, tag) disagree, so a tag can never publish a
# mismatched/duplicate wheel (the silent-failure mode that bit v0.5.1).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  version-guard:
    name: Version sources agree
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Cargo.toml == __init__ == tag
        run: |
          cargo=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          init=$(sed -n 's/^__version__ = "\(.*\)"/\1/p' python/askfaro/__init__.py)
          echo "Cargo.toml=$cargo  __init__=$init  ref=${GITHUB_REF##*/}"
          if [ "$cargo" != "$init" ]; then
            echo "::error::Cargo.toml ($cargo) != __init__ ($init). The wheel version is Cargo.toml's; bump both."
            exit 1
          fi
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            tag="${GITHUB_REF#refs/tags/v}"
            if [ "$tag" != "$cargo" ]; then
              echo "::error::tag v$tag != Cargo.toml $cargo."
              exit 1
            fi
          fi

  contract:
    name: Live contract checks (gate the release)
    needs: version-guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Build + install
        run: |
          uv venv
          uv pip install ".[dev]"
      - name: Live contract tests
        # Block the publish if the SDK has drifted from the REAL Faro contract.
        # The authed run() check needs FARO_API_KEY (an unknown-skill probe, $0);
        # without the secret it skips and the no-key discovery + core checks still
        # gate. Add the FARO_API_KEY repo secret to make the run() path binding.
        env:
          FARO_API_KEY: ${{ secrets.FARO_API_KEY }}
        run: .venv/bin/pytest -m live -v --tb=short

  build-wheels:
    name: Build wheels (${{ matrix.platform.target }})
    needs: contract
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: ubuntu-latest, target: x86_64, manylinux: auto }
          - { runner: ubuntu-latest, target: aarch64, manylinux: auto }
          - { runner: macos-latest, target: universal2-apple-darwin, manylinux: "off" }
    steps:
      - uses: actions/checkout@v5
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          manylinux: ${{ matrix.platform.manylinux }}
          args: --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.target }}
          path: dist/*.whl

  publish-pypi:
    name: Publish to PyPI
    needs: build-wheels
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # PyPI trusted publishing (OIDC) — no API token. Register the trusted
      # publisher (repo poolside-ventures/askfaro, workflow release.yml,
      # environment pypi) at:
      # https://pypi.org/manage/project/askfaro/settings/publishing/
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        # Wheels only: askfaro bundles the in-repo faro-core-free crate, so there
        # is no standalone-buildable sdist.

  verify-published:
    name: Verify it really landed on PyPI
    needs: publish-pypi
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Poll PyPI for the tagged version (fail if absent)
        run: |
          V="${GITHUB_REF#refs/tags/v}"
          echo "Waiting for askfaro $V on PyPI…"
          for i in $(seq 1 24); do
            curl -fsSL "https://pypi.org/pypi/askfaro/$V/json" >/dev/null 2>&1 && echo "✓ askfaro $V live" && exit 0
            sleep 15
          done
          echo "::error::askfaro $V did NOT appear on PyPI — the publish silently no-op'd."
          exit 1
