name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust tests (faro-core-free)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p faro-core-free

  python:
    name: Python tests (askfaro)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      # ubuntu-latest ships a Rust toolchain; maturin builds askfaro._core on install.
      - name: Build + install
        run: |
          uv venv
          uv pip install ".[dev]"
      - name: pytest
        run: .venv/bin/pytest -v --tb=short
